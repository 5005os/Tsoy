<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>СКЛАД ЦОЙ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECEEF1; --paper:#FFFFFF; --ink:#15171C; --soft:#5A6170;
    --line:#E2E5EA; --accent:#FF5A1F; --accent-d:#E64910;
    --blue:#2563EB; --green:#16A34A; --red:#E11D48;
    --purple:#7C3AED; --amber:#D97706; --slate:#64748B;
    --shadow:0 1px 2px rgba(20,23,28,.06),0 8px 24px rgba(20,23,28,.05);
    --tab-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));
    overscroll-behavior-y:none;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* App bar */
  .appbar{
    position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .appbar h1{font-size:18px;font-weight:800;margin:0;letter-spacing:.04em;display:flex;align-items:center;gap:9px}
  .appbar h1 .bars{display:inline-flex;gap:2px;align-items:flex-end;height:18px}
  .appbar h1 .bars i{display:block;width:2px;background:var(--accent);border-radius:1px}
  .appbar .sub{font-size:11px;color:#9aa1ad;font-weight:500;margin-top:2px}
  .bar-right{display:flex;align-items:center;gap:8px}
  .add-btn{
    background:var(--accent);color:#fff;font-weight:700;font-size:13px;
    padding:9px 12px;border-radius:11px;display:none;align-items:center;gap:5px;
    box-shadow:0 4px 12px rgba(255,90,31,.35);
  }
  .add-btn:active{background:var(--accent-d)}
  .add-btn svg{width:15px;height:15px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;
    font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}

  .view{display:none;padding:16px 14px 24px}
  .view.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--paper);border-radius:16px;padding:14px;box-shadow:var(--shadow);
    border:1px solid var(--line);position:relative;overflow:hidden}
  .stat .num{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.01em}
  .stat .lab{font-size:12px;color:var(--soft);font-weight:600;margin-top:7px}
  .stat .tag{position:absolute;top:14px;right:14px;width:9px;height:9px;border-radius:50%}
  .stat.wide{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between}
  .stat.wide .num{font-size:34px}
  .section-h{font-size:13px;font-weight:700;color:var(--soft);text-transform:uppercase;
    letter-spacing:.06em;margin:24px 4px 12px}
  .srv{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .srv-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .srv-t{font-weight:700;font-size:14px}
  .srv-v{color:var(--soft);font-weight:600;font-size:11px;margin-left:4px}
  .srv-btn{background:var(--ink);color:#fff;font-weight:700;font-size:12px;padding:8px 14px;border-radius:9px}
  .srv-btn:active{opacity:.8}
  .srv-hint{font-size:12px;color:var(--soft);margin-top:8px}
  .srv-list{margin-top:11px;display:flex;flex-direction:column;gap:8px}
  .srv-row{display:flex;align-items:flex-start;gap:8px;font-size:13.5px}
  .srv-ic{font-weight:800;width:15px;flex-shrink:0;line-height:1.3}
  .srv-ic.ok{color:var(--green)} .srv-ic.no{color:var(--red)}
  .srv-n{font-weight:600}
  .srv-n small{display:block;color:var(--red);font-weight:500;font-size:11.5px;margin-top:2px;word-break:break-word}

  .search{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
    border-radius:13px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:14px}
  .search svg{width:18px;height:18px;color:var(--soft);flex-shrink:0}
  .search input{border:none;outline:none;font-size:16px;width:100%;background:none;color:var(--ink);font-family:inherit}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:14px;box-shadow:var(--shadow);margin-bottom:11px}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .name{font-size:16px;font-weight:700;line-height:1.25}
  .card .code{font-size:12.5px;color:var(--soft);margin-top:4px;letter-spacing:.03em;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .card .code .bc{display:inline-flex;gap:1.5px;align-items:flex-end}
  .card .code .bc i{display:block;width:1.5px;height:13px;background:var(--soft);opacity:.5}
  .counts{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
  .chip{flex:1;min-width:78px;background:#F6F7F9;border-radius:11px;padding:9px 10px;text-align:center}
  .chip .v{font-size:19px;font-weight:700;line-height:1}
  .chip .k{font-size:10.5px;color:var(--soft);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.03em}
  .chip.k0 .v{color:var(--ink)} .chip.b .v{color:var(--blue)}

  .thumb{width:54px;height:54px;border-radius:12px;object-fit:cover;background:#F0F1F4;flex-shrink:0}
  .thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--soft);border:1px dashed var(--line)}

  .row-actions{display:flex;gap:8px;margin-top:12px}
  .mini{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px;font-size:13px;font-weight:600;
    color:var(--ink);background:#fff;display:flex;align-items:center;justify-content:center;gap:5px}
  .mini:active{background:#F0F1F4}
  .mini.danger{color:var(--red);border-color:#FAD2DA}
  .mini svg{width:15px;height:15px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    padding:5px 10px;border-radius:99px;white-space:nowrap}
  .pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .p-repair{color:var(--purple);background:#F1EAFE}
  .p-done{color:var(--green);background:#E4F6EA}
  .p-parts{color:var(--slate);background:#EEF1F5}
  .p-assemble{color:var(--amber);background:#FEF3E2}
  .p-ready{color:var(--green);background:#E4F6EA}

  .filters{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;margin:0 -2px}
  .filters::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;border:1px solid var(--line);background:var(--paper);border-radius:99px;
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--soft)}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .empty{text-align:center;padding:48px 24px;color:var(--soft)}
  .empty svg{width:46px;height:46px;opacity:.4;margin-bottom:14px}
  .empty .t{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .empty .d{font-size:13.5px;line-height:1.5}

  .ship-meta{display:flex;gap:14px;margin-top:10px;font-size:12.5px;color:var(--soft);font-weight:600;flex-wrap:wrap}
  .ship-item{display:flex;align-items:center;gap:10px;background:#F6F7F9;border-radius:11px;padding:10px 12px;margin-bottom:8px}
  .ship-item .nm{flex:1;font-size:14px;font-weight:600;line-height:1.3}
  .ship-item .nm small{display:block;font-size:11.5px;color:var(--soft);font-weight:500;margin-top:2px}
  .ship-item .q{font-weight:700;color:var(--blue)}
  .ship-item .x{color:var(--red);font-weight:700;font-size:20px;padding:0 2px}

  /* tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--tab-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--soft);font-size:10px;font-weight:600;position:relative}
  .tab svg{width:22px;height:22px}
  .tab.on{color:var(--accent)}
  .tab .badge{position:absolute;top:5px;left:calc(50% + 5px);min-width:15px;height:15px;border-radius:8px;
    background:var(--red);color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;
    justify-content:center;padding:0 3px}

  /* modal */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(20,23,28,.45);display:none;align-items:flex-end}
  .overlay.show{display:flex}
  .sheet{background:var(--paper);width:100%;border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:90vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.9,.3,1)}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:8px auto 14px}
  .sheet h2{font-size:20px;font-weight:800;margin:0 0 16px}
  label.fl{display:block;font-size:12.5px;font-weight:700;color:var(--soft);margin:13px 0 6px}
  .inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;
    font-family:inherit;outline:none;color:var(--ink);background:#fff}
  .inp:focus{border-color:var(--accent)}
  .two{display:flex;gap:10px}.two>div{flex:1}
  .seg{display:flex;gap:8px;margin-top:6px}
  .seg button{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:11px;font-weight:700;font-size:13.5px;color:var(--soft)}
  .seg button.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .save{width:100%;background:var(--accent);color:#fff;font-weight:800;font-size:16px;padding:15px;
    border-radius:14px;margin-top:22px;box-shadow:0 6px 16px rgba(255,90,31,.3)}
  .save:active{background:var(--accent-d)}
  .link{display:block;text-align:center;color:var(--soft);font-size:13px;font-weight:600;margin:26px auto 8px;text-decoration:underline}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:12px;background:#fff}
  .opt:active{background:#F6F7F9}
  .opt .ot{font-weight:700;font-size:16px}
  .opt .od{font-size:13px;color:var(--soft);margin-top:3px}
  .opt.primary{border-color:var(--accent);background:#FFF4EF}
  .opt.primary .ot{color:var(--accent-d)}
  .actions{display:flex;gap:10px;margin-bottom:14px}
  .ab{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:13px 8px;font-weight:700;font-size:13.5px;color:var(--ink);box-shadow:var(--shadow)}
  .ab:active{background:#F0F1F4}
  .ab.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(255,90,31,.3)}
  .ab.primary:active{background:var(--accent-d)}

  .photo-row{display:flex;gap:14px;align-items:center;margin-bottom:2px}
  .photo-box{width:92px;height:92px;border-radius:15px;background:#F6F7F9;border:1.5px dashed var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--soft);overflow:hidden;flex-shrink:0;cursor:pointer}
  .photo-box img{width:100%;height:100%;object-fit:cover}
  .photo-info .pi-t{font-weight:700;font-size:15px}
  .photo-info .pi-d{font-size:12.5px;color:var(--soft);margin-top:3px;line-height:1.4}
  .pi-load{font-size:13px;color:var(--soft);font-weight:600}

  /* login */
  .login{position:fixed;inset:0;z-index:100;background:var(--ink);color:#fff;display:flex;
    flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center}
  .login.hide{display:none}
  .login .lg{font-size:30px;font-weight:800;letter-spacing:.05em;display:flex;align-items:center;gap:12px}
  .login .lg .bars{display:inline-flex;gap:3px;align-items:flex-end;height:30px}
  .login .lg .bars i{display:block;width:3px;background:var(--accent);border-radius:1px}
  .login .tag{color:#9aa1ad;font-size:14px;margin:10px 0 34px;font-weight:500}
  .login .lbox{width:100%;max-width:330px}
  .login input{width:100%;border:1.5px solid #2c2f37;background:#1d2026;color:#fff;border-radius:13px;
    padding:15px 16px;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px}
  .login input:focus{border-color:var(--accent)}
  .login button{width:100%;background:var(--accent);color:#fff;font-weight:800;font-size:16px;
    padding:16px;border-radius:13px;margin-top:6px}
  .login .err{color:#ff8c8c;font-size:13.5px;font-weight:600;min-height:20px;margin-top:12px}

  /* chat */
  #view-chat{padding-bottom:84px}
  .chat-banner{background:#FEF3E2;color:#9a6206;border:1px solid #f6dca6;border-radius:12px;
    padding:11px 13px;font-size:12.5px;line-height:1.45;font-weight:500;margin-bottom:14px}
  .chat-list{display:flex;flex-direction:column;gap:3px}
  .day{align-self:center;background:#E2E5EA;color:var(--soft);font-size:11px;font-weight:700;
    padding:4px 11px;border-radius:99px;margin:10px 0}
  .msg{max-width:80%;padding:9px 13px;border-radius:16px;margin-bottom:6px;font-size:14.5px;line-height:1.35;word-break:break-word}
  .msg.them{background:var(--paper);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px}
  .msg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
  .msg .who{font-size:11.5px;font-weight:700;color:var(--purple);margin-bottom:2px}
  .msg .tm{font-size:10px;opacity:.65;margin-top:3px;text-align:right}
  .chat-input{position:fixed;left:0;right:0;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));
    z-index:35;display:none;gap:8px;padding:10px 12px;background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .chat-input.show{display:flex}
  .chat-input input{flex:1;border:1.5px solid var(--line);border-radius:22px;padding:11px 16px;
    font-size:16px;font-family:inherit;outline:none}
  .chat-input input:focus{border-color:var(--accent)}
  .chat-input button{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;
    flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .chat-input button svg{width:20px;height:20px}
  .chat-input .attach{background:#EEF0F3;color:var(--soft)}
  .chat-input .attach:active{background:#E2E5EA}
  .chat-input .attach svg{width:21px;height:21px}
  .msg-img{max-width:210px;max-height:240px;border-radius:12px;display:block;margin-top:2px}
  .file-card{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;margin-top:2px}
  .file-card .fi{width:40px;height:40px;border-radius:10px;background:rgba(20,23,28,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:var(--soft)}
  .msg.me .file-card .fi{background:rgba(255,255,255,.22);color:#fff}
  .file-card .fn{font-weight:600;font-size:13.5px;line-height:1.25;word-break:break-word}
  .file-card .fs{font-size:11px;opacity:.7;margin-top:2px}
</style>
</head>
<body>

<!-- ВХОД -->
<div class="login" id="login">
  <div class="lg"><span class="bars"><i style="height:16px"></i><i style="height:26px"></i><i style="height:12px"></i><i style="height:30px"></i><i style="height:18px"></i></span>СКЛАД ЦОЙ</div>
  <div class="tag">Учёт товаров</div>
  <div class="lbox">
    <input id="lg-login" placeholder="Логин" autocomplete="off" autocapitalize="off">
    <input id="lg-pass" type="password" placeholder="Пароль" autocomplete="off">
    <button id="lg-btn">Войти</button>
    <div class="err" id="lg-err"></div>
  </div>
</div>

<header class="appbar">
  <div>
    <h1><span class="bars"><i style="height:10px"></i><i style="height:16px"></i><i style="height:7px"></i><i style="height:18px"></i><i style="height:11px"></i></span>СКЛАД ЦОЙ</h1>
    <div class="sub" id="appsub">Учёт товаров</div>
  </div>
  <div class="bar-right">
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span id="addLabel">Добавить</span>
    </button>
    <button class="avatar" id="avatarBtn">?</button>
  </div>
</header>

<main class="view active" id="view-home"></main>
<main class="view" id="view-chat"></main>
<main class="view" id="view-goods"></main>
<main class="view" id="view-returns"></main>
<main class="view" id="view-ship"></main>

<div class="chat-input" id="chatInput">
  <button id="chatAttach" class="attach"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5 12.5 20a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7L10 16.5a1.6 1.6 0 0 1-2.3-2.3l7.8-7.8"/></svg></button>
  <input id="chatField" placeholder="Сообщение…" autocomplete="off">
  <button id="chatSend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 12 16-8-5 16-3.5-6.5L4 12Z"/></svg></button>
</div>
<input type="file" id="chatFile" hidden>

<nav class="tabbar">
  <button class="tab on" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5M5 9.5V20h14V9.5" stroke-linejoin="round" stroke-linecap="round"/></svg>Главная</button>
  <button class="tab" data-tab="chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 5h16v11H9l-5 4V5Z"/></svg>Чат
    <span class="badge" id="badge-chat" style="display:none">0</span></button>
  <button class="tab" data-tab="goods">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7.5 12 3l9 4.5v9L12 21 3 16.5v-9Z" stroke-linejoin="round"/><path d="m3 7.5 9 4.5 9-4.5M12 12v9" stroke-linejoin="round"/></svg>Товары</button>
  <button class="tab" data-tab="returns">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>Возвраты
    <span class="badge" id="badge-returns" style="display:none">0</span></button>
  <button class="tab" data-tab="ship">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6h12v9H1zM13 9h4l3 3v3h-7z"/><circle cx="6" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>Фура
    <span class="badge" id="badge-ship" style="display:none">0</span></button>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
/* ====== НАСТРОЙКА ОБЩЕГО ЧАТА (по желанию) ======
   Чтобы трое переписывались с разных телефонов — вставь сюда

async function compressToBlob(file,max,q){
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){ bmp=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;const fr=new FileReader();fr.onload=ev=>i.src=ev.target.result;fr.onerror=rej;fr.readAsDataURL(file);}); }
  let w=bmp.width,h=bmp.height;
  if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(bmp,0,0,w,h);
  return await new Promise(r=>c.toBlob(r,'image/jpeg',q));
}
function fmtDay(t){return new Date(t).toLocaleDateString('ru-RU',{day:'2-digit',month:'long'})}
function photoIcon(s){s=s||30;return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.2"/></svg>`}
async function compressImage(file,max,q){
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){ bmp=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;const fr=new FileReader();fr.onload=ev=>i.src=ev.target.result;fr.onerror=rej;fr.readAsDataURL(file);}); }
  let w=bmp.width,h=bmp.height;
  if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(bmp,0,0,w,h);
  return c.toDataURL('image/jpeg',q);
}

/* ---------- Чат ---------- */
function renderChat(){
  const v=$('#view-chat');
  const banner = cloudOn ? '' :
    `<div class="chat-banner">Чат сейчас работает только на этом устройстве. Чтобы Аза, Николай и Юлия переписывались с разных телефонов — нужно подключить общую базу (инструкция у разработчика).</div>`;
  let html=banner+'<div class="chat-list">';
  let lastDay='';
  if(!chatMsgs.length){ html+='<div class="empty" style="padding:30px 10px"><div class="d">Сообщений пока нет. Напишите первое 👋</div></div>'; }
  chatMsgs.forEach(m=>{
    const day=fmtDay(m.ts);
    if(day!==lastDay){ html+=`<div class="day">${day}</div>`; lastDay=day; }
    const me=currentUser&&m.user===currentUser.login;
    let body='';
    if(m.fileUrl){
      if((m.fileType||'').startsWith('image/')){ body=`<a href="${m.fileUrl}" target="_blank" rel="noopener"><img class="msg-img" src="${m.fileUrl}" alt=""></a>`; }
      else{ body=`<a class="file-card" href="${m.fileUrl}" target="_blank" rel="noopener" download="${esc(m.fileName||'file')}"><span class="fi">${fileEmoji(m.fileType,m.fileName)}</span><span><span class="fn">${esc(m.fileName||'Файл')}</span><span class="fs">${fmtSize(m.fileSize)} · открыть</span></span></a>`; }
    }
    if(m.text){ body+=`<div${m.fileUrl?' style="margin-top:6px"':''}>${esc(m.text)}</div>`; }
    html+=`<div class="msg ${me?'me':'them'}">${me?'':`<div class="who">${esc(m.user)}</div>`}${body}<div class="tm">${fmtTime(m.ts)}</div></div>`;
  });
  html+='</div>';
  v.innerHTML=html;
}
function scrollChat(){ setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),60); }
async function sendMsg(){
  const f=$('#chatField'); const text=f.value.trim(); if(!text||!currentUser)return;
  f.value='';
  if(cloudOn){
    try{ await supa.from('messages').insert({login:currentUser.login,text}); }catch(e){ alert('Не удалось отправить'); }
  }else{
    chatMsgs.push({id:id(),user:currentUser.login,text,ts:Date.now()});
    saveChat(); renderChat(); scrollChat();
  }
}
$('#chatSend').onclick=sendMsg;
$('#chatField').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
$('#chatAttach').onclick=()=>{ if(!cloudOn){alert('Отправка файлов работает в общем режиме (когда подключён сервер).');return;} $('#chatFile').click(); };
$('#chatFile').onchange=async e=>{ const file=e.target.files[0]; e.target.value=''; if(file)await uploadChatFile(file); };
async function uploadChatFile(file){
  if(!cloudOn||!currentUser)return;
  const btn=$('#chatAttach'); const old=btn.innerHTML; btn.disabled=true; btn.textContent='…';
  try{
    let body=file, type=file.type||'application/octet-stream', name=file.name||'file';
    if(type.startsWith('image/')){ try{ body=await compressToBlob(file,1280,0.75); type='image/jpeg'; name=name.replace(/\.[^.]+$/,'')+'.jpg'; }catch(_){ body=file; type=file.type; name=file.name; } }
    const safe=name.replace(/[^\w.\-]+/g,'_').slice(-60);
    const path=Date.now()+'_'+Math.random().toString(36).slice(2,8)+'_'+safe;
    const up=await supa.storage.from('chatfiles').upload(path,body,{contentType:type,upsert:false});
    if(up.error)throw up.error;
    const url=supa.storage.from('chatfiles').getPublicUrl(path).data.publicUrl;
    const size=(body&&body.size)||file.size||0;
    const ins=await supa.from('messages').insert({login:currentUser.login,text:'',file_url:url,file_name:name,file_type:type,file_size:size});
    if(ins.error)throw ins.error;
    cleanupStorage();
  }catch(err){ alert('Не удалось отправить файл: '+(err.message||err)); }
  btn.disabled=false; btn.innerHTML=old;
}
async function cleanupStorage(){
  if(!cloudOn)return;
  try{
    const {data}=await supa.storage.from('chatfiles').list('',{limit:1000,sortBy:{column:'created_at',order:'asc'}});
    if(!data||!data.length)return;
    let total=data.reduce((t,f)=>t+((f.metadata&&f.metadata.size)||0),0);
    const LIMIT=900*1024*1024, TARGET=700*1024*1024;
    if(total<=LIMIT)return;
    for(const f of data){
      if(total<=TARGET)break;
      await supa.storage.from('chatfiles').remove([f.name]);
      await supa.from('messages').delete().like('file_url','%'+f.name);
      total-=((f.metadata&&f.metadata.size)||0);
    }
  }catch(e){}
}

async function initCloud(){
  if(!CONFIG.supabaseUrl||!CONFIG.supabaseKey) return;
  try{
    const m=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    supa=m.createClient(CONFIG.supabaseUrl,CONFIG.supabaseKey);
    cloudOn=true;
    setStatus('подключение…','#cfd3da');
    // СКЛАД
    await cloudLoadWarehouse();
    supa.channel('wh').on('postgres_changes',{event:'*',schema:'public',table:'warehouse'},()=>cloudLoadWarehouse()).subscribe();
    // ЧАТ
    const {data,error}=await supa.from('messages').select('*').order('created_at',{ascending:true}).limit(300);
    if(error)throw error;
    chatMsgs=(data||[]).map(mapMsg);
    renderChat(); if(tab==='chat')scrollChat();
    supa.channel('msg').on('postgres_changes',{event:'*',schema:'public',table:'messages'},p=>{
      if(p.eventType==='DELETE'){ if(p.old&&p.old.id){chatMsgs=chatMsgs.filter(x=>x.id!==p.old.id);renderChat();} return; }
      const r=p.new;
      if(!r||chatMsgs.some(x=>x.id===r.id))return;
      chatMsgs.push(mapMsg(r));
      renderChat(); if(tab==='chat')scrollChat();
    }).subscribe();
  }catch(e){ cloudError('чат — '+(e.message||e)); }
}

    $('#s-seg').querySelectorAll('button').forEach(b=>b.onclick=()=>{status=b.dataset.v;$('#s-seg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));});
    $('#s-iname').onchange=e=>{const o=[...document.querySelectorAll('#prodlist2 option')].find(x=>x.value===e.target.value);if(o)$('#s-ibc').value=o.dataset.bc;};
    $('#s-add').onclick=()=>{const n=$('#s-iname').value.trim();const q=+$('#s-iqty').value||0;if(!n||q<=0)return alert('Укажите товар и количество');const bcv=$('#s-ibc').value.trim();const prod=db.products.find(x=>(bcv&&x.barcode===bcv)||x.name===n);const w=prod?(+prod.weight||0):0;items.push({name:n,barcode:bcv,qty:q,weight:w});draw({c:$('#s-city').value,t:$('#s-truck').value,d:$('#s-driver').value,dep:$('#s-depart').value});};
    document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{items.splice(+b.dataset.rm,1);draw({c:$('#s-city').value,t:$('#s-truck').value,d:$('#s-driver').value,dep:$('#s-depart').value});});
    $('#s-save').onclick=()=>{
      const city=$('#s-city').value.trim(); if(!city)return alert('Укажите город');
      if(s){ s.items.forEach(it=>adjustStock(it,1)); }      // вернуть старое
      items.forEach(it=>adjustStock(it,-1));                // списать новое
      const o={city,truck:$('#s-truck').value.trim(),driver:$('#s-driver').value.trim(),depart:$('#s-depart').value,items,status};
      if(s)Object.assign(s,o); else db.shipments.unshift({id:id(),date:Date.now(),...o});
      save();closeSheet();render();
    };
  }
  draw();
}

render();
initCloud().finally(()=>{ runDiag(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>СКЛАД ЦОЙ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ECEEF1;--paper:#FFF;--ink:#15171C;--accent:#FF5A1F;--line:#E2E5EA;--tab-h:64px}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;padding-bottom:var(--tab-h)}
  .appbar{background:var(--ink);color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}
  .view{display:none;padding:16px}.view.active{display:block}
  .card{background:var(--paper);padding:14px;border-radius:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
  .inp{width:100%;padding:12px;border:1px solid var(--line);border-radius:8px;margin-bottom:10px;font-size:16px}
  .btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:700;width:100%;font-size:16px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:#fff;border-top:1px solid var(--line);display:flex}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#999}
  .tab.on{color:var(--accent)}
  .login{position:fixed;inset:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .login.hide{display:none}
</style>
</head>
<body>

<!-- ВХОД -->
<div class="login" id="login">
  <h1>СКЛАД ЦОЙ</h1>
  <input id="lg-login" class="inp" placeholder="Логин (Аза, Николай, Юлия)" style="background:#2c2f37;color:#fff;border-color:#444">
  <input id="lg-pass" type="password" class="inp" placeholder="Пароль" style="background:#2c2f37;color:#fff;border-color:#444">
  <button class="btn" onclick="doLogin()">Войти</button>
  <div id="lg-err" style="color:#ff8c8c;margin-top:10px"></div>
</div>

<header class="appbar">
  <div><b>СКЛАД ЦОЙ</b></div>
  <div id="status" style="font-size:12px;color:#aaa">Загрузка...</div>
</header>

<main class="view active" id="view-home"><div class="card">Добро пожаловать на склад!</div></main>
<main class="view" id="view-goods"><div class="card">Здесь будут товары...</div></main>
<main class="view" id="view-chat"><div class="card">Здесь будет чат...</div></main>

<nav class="tabbar">
  <button class="tab on" onclick="switchTab('home')">🏠 Главная</button>
  <button class="tab" onclick="switchTab('goods')">📦 Товары</button>
  <button class="tab" onclick="switchTab('chat')">💬 Чат</button>
</nav>

<script type="module">
  import PocketBase from 'https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/+esm';
  
  // --- НАСТРОЙКИ ---
  const pb = new PocketBase('http://mytest1234test1234.ru');
  const USERS = [{login:'Аза',pass:'909010'},{login:'Николай',pass:'Цой2026'},{login:'Юлия',pass:'Склад1'}];
  
  let currentUser = null;
  let db = {products:[], returns:[], shipments:[]};
  let warehouseDocId = null;

  // --- ВХОД ---
  window.doLogin = function() {
    const l = document.getElementById('lg-login').value.trim();
    const p = document.getElementById('lg-pass').value;
    const u = USERS.find(x => x.login.toLowerCase() === l.toLowerCase() && x.pass === p);
    
    if (!u) {
      document.getElementById('lg-err').textContent = 'Неверный логин или пароль';
      return;
    }
    
    currentUser = u;
    document.getElementById('login').classList.add('hide');
    document.querySelector('.appbar div:last-child').textContent = u.login;
    syncData(); // Загружаем данные с сервера после входа
  };

  // --- СИНХРОНИЗАЦИЯ ---
  async function syncData() {
    try {
      const list = await pb.collection('warehouse').getList(1, 1);
      if (list.items.length > 0) {
        warehouseDocId = list.items[0].id;
        const remote = JSON.parse(list.items[0].data || '{}');
        db = remote;
        if(!db.products) db.products = [];
      } else {
        // Если база пустая, создаем запись
        const doc = await pb.collection('warehouse').create({ data: JSON.stringify(db) });
        warehouseDocId = doc.id;
      }
      document.getElementById('status').textContent = '● Сервер подключен';
      document.getElementById('status').style.color = '#6ee7a0';
      renderGoods();
    } catch (e) {
      console.error(e);
      document.getElementById('status').textContent = '⚠ Ошибка связи';
    }
  }

  // --- СОХРАНЕНИЕ ---
  async function saveToCloud() {
    if (!warehouseDocId) return;
    try {
      await pb.collection('warehouse').update(warehouseDocId, { data: JSON.stringify(db) });
    } catch (e) { console.error(e); }
  }

  // --- РЕНДЕР ТОВАРОВ ---
  function renderGoods() {
    const container = document.getElementById('view-goods');
    if (db.products.length === 0) {
      container.innerHTML = '<div class="card">Товаров пока нет. Добавьте первый!</div>';
      return;
    }
    container.innerHTML = db.products.map(p => 
      `<div class="card"><b>${p.name}</b><br>Кол-во: ${p.qty} шт</div>`
    ).join('');
  }

  // --- НАВИГАЦИЯ ---
  window.switchTab = function(tabName) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tabName).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    event.target.closest('.tab').classList.add('on');
  };
</script>
</body>
</html>
